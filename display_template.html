<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Display</title>
</head>
<body>
<div id="app"></div>

<script>
function detectLocale(values) {
  var trCount = 0, usCount = 0;
  for (var i = 0; i < values.length; i++) {
    var v = String(values[i]);
    if (v.indexOf('.') !== -1 && v.indexOf(',') !== -1) {
      if (v.lastIndexOf(',') > v.lastIndexOf('.')) trCount++;
      else usCount++;
    }
  }
  return trCount > usCount ? 'tr' : 'us';
}

function parseNumber(s, locale) {
  var v = String(s).trim();
  if (!v) return NaN;
  if (locale === 'tr') {
    v = v.replace(/\./g, '').replace(',', '.');
  } else {
    v = v.replace(/,/g, '');
  }
  return parseFloat(v);
}

function sum(arr, locale) {
  return arr.reduce(function (a, b) { return a + (parseNumber(b, locale) || 0); }, 0);
}

function avg(arr, locale) {
  if (!arr.length) return 0;
  return sum(arr, locale) / arr.length;
}

function mult(arr, locale) {
  return arr.reduce(function (a, b) { return a * (parseNumber(b, locale) || 1); }, 1);
}

function formatValue(raw, locale) {
  var v = String(raw);
  if (!v) return '-';
  var num = parseNumber(v, locale);
  if (isNaN(num)) return v;
  var clean = v;
  if (locale === 'tr') { clean = clean.replace(/\./g, '').replace(',', '.'); }
  else { clean = clean.replace(/,/g, ''); }
  var parts = clean.split('.');
  if (parts.length === 1) return Math.round(num).toLocaleString('en-US');
  return num.toFixed(Math.min(parts[1].length, 6));
}

function render(data) {
  var html = '<table><thead><tr><th>Name</th><th>Value</th></tr></thead><tbody>';
  for (var p = 0; p < data.length; p++) {
    var values = data[p].entries.map(function(e) { return e.value; });
    var locale = detectLocale(values);
    for (var e = 0; e < data[p].entries.length; e++) {
      var entry = data[p].entries[e];
      html += '<tr><td>' + escapeHtml(entry.display_name || entry.variable_name) + '</td><td class="value">' + escapeHtml(formatValue(entry.value, locale)) + '</td></tr>';
    }
  }
  html += '</tbody></table>';
  document.getElementById('app').innerHTML = html;
}

function escapeHtml(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
</script>
</body>
</html>
